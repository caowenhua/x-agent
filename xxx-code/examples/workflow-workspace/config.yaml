# A self-contained config focused on multi-agent workflow orchestration.
provider: anthropic
model: claude-sonnet-4-5

# All relative paths below resolve from this config file's directory.
cwd: .
session_file: .xxx-code/session.json

allow_read:
  - .
allow_write:
  - .

# Keep the tool surface intentionally small for workflow demos.
allow_tools:
  - read_file
  - write_file
  - agent_fanout
  - workflow_list
  - workflow_get
  - workflow_tasks
  - workflow_resume

stream: true
verbose: false
log_level: info
tool_timeout: 30s
hook_timeout: 15s
max_turns: 10
