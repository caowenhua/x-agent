version: 2

project_name: xxx-code

before:
  hooks:
    - cd xxx-code && go test ./...

builds:
  - id: xxx-code
    dir: xxx-code
    main: ./cmd/xxx-code
    binary: xxx-code
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/caowenhua/x-agent/xxx-code/internal/buildinfo.Version={{ .Version }}
      - -X github.com/caowenhua/x-agent/xxx-code/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/caowenhua/x-agent/xxx-code/internal/buildinfo.Date={{ .Date }}
      - -X github.com/caowenhua/x-agent/xxx-code/internal/buildinfo.BuiltBy=goreleaser
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
  - id: xxx-code-stability
    dir: xxx-code
    main: ./cmd/xxx-code-stability
    binary: xxx-code-stability
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/caowenhua/x-agent/xxx-code/internal/buildinfo.Version={{ .Version }}
      - -X github.com/caowenhua/x-agent/xxx-code/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/caowenhua/x-agent/xxx-code/internal/buildinfo.Date={{ .Date }}
      - -X github.com/caowenhua/x-agent/xxx-code/internal/buildinfo.BuiltBy=goreleaser
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: xxx-code-archive
    ids:
      - xxx-code
      - xxx-code-stability
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - src: xxx-code/README.md
        dst: docs/README.md
      - src: xxx-code/ROADMAP.md
        dst: docs/ROADMAP.md
      - src: xxx-code/docs/stability-soak.md
        dst: docs/stability-soak.md
      - src: xxx-code/examples/config.yaml
        dst: examples/config.yaml

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: csonxx
    name: x-agent
